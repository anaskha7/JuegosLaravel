services:
  postgres:
    image: postgres:16
    container_name: laraveljuegos-postgres
    environment:
      POSTGRES_DB: laraveljuegos
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laraveljuegos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laraveljuegos-app
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "composer install &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laraveljuegos-reverb
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "composer install &&
      php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  facial-service:
    build:
      context: ./facial-service
      dockerfile: Dockerfile
    container_name: laraveljuegos-facial-service
    ports:
      - "8181:8181"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: laraveljuegos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laraveljuegos-queue-worker
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "composer install &&
      php artisan rabbitmq:queue-declare github-events rabbitmq &&
      php artisan rabbitmq:queue-declare platform-events rabbitmq &&
      php artisan queue:work rabbitmq --queue=github-events,platform-events --sleep=3 --tries=3 --timeout=120"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
