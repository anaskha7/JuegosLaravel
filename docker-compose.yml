services:
  postgres:
    image: postgres:16
    container_name: laraveljuegos-postgres
    environment:
      POSTGRES_DB: laraveljuegos
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laraveljuegos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laraveljuegos-app
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "composer install &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laraveljuegos-reverb
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "composer install &&
      php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  facial-service:
    build:
      context: ./facial-service
      dockerfile: Dockerfile
    container_name: laraveljuegos-facial-service
    ports:
      - "8181:8181"

volumes:
  postgres_data:
