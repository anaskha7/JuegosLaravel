<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb Rush</title>
    <link rel="stylesheet" href="/games/shared/game-shell.css">
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.170.0/build/three.module.js';
        import { bloquearTeclasDeScroll, finishSession, mountHud, pushEmotion, runCountdown, setScore, setStatus, startSession } from '/games/shared/api-client.js';

        mountHud({
            title: 'Orb Rush',
            instructions: 'WASD o flechas para moverte. Recoge 12 orbes antes de que termine la cuenta atrás.',
        });
        bloquearTeclasDeScroll();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060816);
        scene.fog = new THREE.Fog(0x060816, 12, 32);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const light = new THREE.PointLight(0x7fbcff, 24, 80);
        light.position.set(0, 14, 0);
        light.castShadow = true;
        scene.add(light);

        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(11, 64),
            new THREE.MeshStandardMaterial({ color: 0x101833, metalness: 0.25, roughness: 0.75 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(10.5, 0.16, 18, 120),
            new THREE.MeshBasicMaterial({ color: 0x294f7f })
        );
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        const player = new THREE.Mesh(
            new THREE.SphereGeometry(0.58, 28, 28),
            new THREE.MeshStandardMaterial({ color: 0xffcb7e, emissive: 0x5b340b })
        );
        player.position.set(0, 0.58, 0);
        player.castShadow = true;
        scene.add(player);

        const particles = [];
        const keys = new Set();
        const clock = new THREE.Clock(false);
        const totalOrbs = 12;
        const limitSeconds = 45;
        let score = 0;
        let finished = false;
        let gameStarted = false;

        function randomArenaPosition() {
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.8 + Math.random() * 7.5;
            return new THREE.Vector3(Math.cos(angle) * radius, 0.55, Math.sin(angle) * radius);
        }

        function createOrb() {
            const orb = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.45, 0),
                new THREE.MeshStandardMaterial({ color: 0xe572ff, emissive: 0x53126d })
            );
            orb.position.copy(randomArenaPosition());
            scene.add(orb);
            particles.push(orb);
        }

        for (let index = 0; index < totalOrbs; index += 1) {
            createOrb();
        }

        window.addEventListener('keydown', (event) => keys.add(event.key.toLowerCase()));
        window.addEventListener('keyup', (event) => keys.delete(event.key.toLowerCase()));
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        async function closeGame(reason) {
            if (finished) {
                return;
            }

            finished = true;
            setStatus(reason);
            await pushEmotion(reason.includes('tiempo') ? 'tension' : 'joy', 0.78, { score });
            await finishSession(score, {
                collected_orbs: score / 10,
                elapsed_seconds: Math.round(clock.getElapsedTime()),
                outcome: reason,
            });
        }

        function animate() {
            const elapsed = clock.getElapsedTime();
            const remain = Math.max(0, limitSeconds - Math.floor(elapsed));
            const move = new THREE.Vector3();
            const speed = 0.11;

            if (gameStarted && !finished) {
                if (keys.has('w') || keys.has('arrowup')) move.z -= speed;
                if (keys.has('s') || keys.has('arrowdown')) move.z += speed;
                if (keys.has('a') || keys.has('arrowleft')) move.x -= speed;
                if (keys.has('d') || keys.has('arrowright')) move.x += speed;

                const next = player.position.clone().add(move);
                const distance = Math.hypot(next.x, next.z);
                if (distance < 9.8) {
                    player.position.copy(next);
                }

                particles.forEach((orb) => {
                    orb.rotation.x += 0.03;
                    orb.rotation.y += 0.04;
                    orb.position.y = 0.55 + Math.sin(elapsed * 2 + orb.position.x) * 0.14;
                    if (orb.visible && orb.position.distanceTo(player.position) < 0.95) {
                        orb.visible = false;
                        score += 10;
                        setScore(score);
                    }
                });

                setStatus(`Tiempo ${remain}s · Orbes ${score / 10}/${totalOrbs}`);

                if (score / 10 === totalOrbs) {
                    closeGame('arena completada');
                } else if (remain <= 0) {
                    closeGame('tiempo agotado');
                }
            }

            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 11;
            camera.lookAt(player.position.x, 0, player.position.z);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        setScore(0);
        await runCountdown(5);
        await startSession({ mode: 'orb-rush' });
        clock.start();
        gameStarted = true;
        animate();
    </script>
</body>
</html>
